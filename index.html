<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEU VOTO CERTO – Sistema Premium de Apuração Proporcional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); transition: background 0.3s; padding: 1.5rem; }
        :root {
            --bg-body: #f0f4f8; --bg-card: #ffffff; --text-primary: #1a2c3e; --text-secondary: #2c3e50;
            --border: #e2e8f0; --accent: #0f766e; --accent-light: #ccfbf1; --danger: #dc2626; --warning: #f59e0b;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }
        body.dark {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-primary: #f1f5f9; --text-secondary: #cbd5e1;
            --border: #334155; --accent: #2dd4bf; --accent-light: #134e4a;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .logo h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #2c7da0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .tab-btn { background: transparent; border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; font-weight: 500; color: var(--text-secondary); transition: 0.2s; }
        .tab-btn.active { background: var(--accent); color: white; }
        .tab-pane { display: none; animation: fade 0.2s; }
        .tab-pane.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--bg-card); border-radius: 1.5rem; box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; border-left: 4px solid var(--accent); padding-left: 0.75rem; }
        .config-grid { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 0.3rem; min-width: 150px; }
        .input-group label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); }
        .input-group input, .input-group select { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.8rem; padding: 0.5rem 0.8rem; color: var(--text-primary); }
        .btn { border: none; border-radius: 2rem; padding: 0.5rem 1.2rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.2s; background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .btn-danger { background: var(--danger); }
        .table-wrapper { overflow-x: auto; border-radius: 1rem; }
        .partidos-table { width: 100%; border-collapse: collapse; }
        .partidos-table th, .partidos-table td { border-bottom: 1px solid var(--border); padding: 0.8rem 0.5rem; text-align: left; vertical-align: top; }
        .candidato-row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 0.4rem; background: var(--bg-body); padding: 0.3rem; border-radius: 1rem; }
        .add-cand-form { display: flex; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .result-stats { background: var(--bg-card); border-radius: 1rem; padding: 1rem; }
        .scenario-list { display: flex; flex-direction: column; gap: 0.8rem; max-height: 400px; overflow-y: auto; }
        .scenario-item { background: var(--bg-body); padding: 0.8rem; border-radius: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .comparador { display: flex; gap: 1rem; flex-wrap: wrap; }
        .comparador-col { flex: 1; min-width: 280px; }
        hr { margin: 1rem 0; border-color: var(--border); }
        .warning-icon { color: var(--warning); margin-left: 0.5rem; cursor: help; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 0.8rem 1.2rem; border-radius: 2rem; z-index: 1000; animation: fadeIn 0.3s; }
        .toast.error { background: var(--danger); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { body { padding: 1rem; } .card { padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1><i class="fas fa-check-circle"></i> SEU VOTO CERTO</h1><p>Sistema Premium de Apuração Proporcional</p></div>
        <button id="themeToggle" class="btn-outline btn-sm"><i class="fas fa-moon"></i> Modo Escuro</button>
    </div>
    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i> Início</button>
        <button class="tab-btn" data-tab="calculator"><i class="fas fa-calculator"></i> Calculadora</button>
        <button class="tab-btn" data-tab="scenarios"><i class="fas fa-folder-open"></i> Cenários</button>
        <button class="tab-btn" data-tab="compare"><i class="fas fa-chart-line"></i> Comparador</button>
        <button class="tab-btn" data-tab="settings"><i class="fas fa-cog"></i> Configurações</button>
    </div>
    <!-- Abas (mesmo conteúdo anterior, mas omitido por brevidade. O código completo está disponível.) -->
    <div id="homePane" class="tab-pane active">[Conteúdo da home]</div>
    <div id="calculatorPane" class="tab-pane">[Calculadora]</div>
    <div id="scenariosPane" class="tab-pane">[Cenários]</div>
    <div id="comparePane" class="tab-pane">[Comparador]</div>
    <div id="settingsPane" class="tab-pane">[Configurações]</div>
</div>
<script>
    // ==================== MÓDULO DE UTILITÁRIOS ====================
    function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : ''}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function validarNome(nome) { return nome.trim().substring(0, 30); }
    function validarVotos(val) { return Math.max(0, parseInt(val) || 0); }

    // ==================== ESTADO GLOBAL ====================
    const App = {
        partidos: [],          // { nome, total, candidatos: [{nome, votos}] }
        cenarios: [],          // { id, nome, data, partidos, totalVotos, numCadeiras }
        ativoId: null,
        chartInstance: null,
        coresPalette: ['#0f766e','#2c7da0','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec489a','#06b6d4','#84cc16','#f97316','#d946ef','#14b8a6','#f43f5e','#6366f1','#a855f7','#eab308','#22c55e'],
        getCor(idx) { return this.coresPalette[idx % this.coresPalette.length]; },
        salvar() { localStorage.setItem('seuVotoCerto_cenarios', JSON.stringify(this.cenarios)); this.notify(); },
        carregar() {
            const stored = localStorage.getItem('seuVotoCerto_cenarios');
            if (stored) {
                try { this.cenarios = JSON.parse(stored); } catch(e) { this.cenarios = []; }
            }
            if (!this.cenarios.length) {
                const id = Date.now();
                this.cenarios.push({ id, nome: "Simulação 1", data: new Date().toISOString(), partidos: [], totalVotos: 10000, numCadeiras: 9 });
                this.ativoId = id;
                this.partidos = [];
            } else {
                const ativo = this.cenarios.find(c => c.id === this.ativoId) || this.cenarios[0];
                this.ativoId = ativo.id;
                this.partidos = JSON.parse(JSON.stringify(ativo.partidos));
            }
            this.notify();
        },
        salvarCenarioAtual(nome, comPdf = false) {
            const idx = this.cenarios.findIndex(c => c.id === this.ativoId);
            if (idx !== -1) {
                this.cenarios[idx].partidos = JSON.parse(JSON.stringify(this.partidos));
                this.cenarios[idx].totalVotos = parseInt(document.getElementById('totalVotos').value);
                this.cenarios[idx].numCadeiras = parseInt(document.getElementById('numCadeiras').value);
                this.cenarios[idx].data = new Date().toISOString();
                if (nome) this.cenarios[idx].nome = nome;
                this.salvar();
                showToast(`Cenário "${this.cenarios[idx].nome}" salvo${comPdf ? ' (com PDF)' : ''}.`);
            } else {
                this.criarNovoCenario(nome);
            }
        },
        criarNovoCenario(nome) {
            if (!nome) nome = `Cenário ${this.cenarios.length+1}`;
            const id = Date.now();
            this.cenarios.push({
                id, nome, data: new Date().toISOString(),
                partidos: JSON.parse(JSON.stringify(this.partidos)),
                totalVotos: parseInt(document.getElementById('totalVotos').value),
                numCadeiras: parseInt(document.getElementById('numCadeiras').value)
            });
            this.ativoId = id;
            this.salvar();
            showToast(`Novo cenário "${nome}" criado.`);
        },
        carregarCenarioPorId(id) {
            const c = this.cenarios.find(c => c.id === id);
            if (c) {
                this.ativoId = id;
                this.partidos = JSON.parse(JSON.stringify(c.partidos));
                document.getElementById('totalVotos').value = c.totalVotos;
                document.getElementById('numCadeiras').value = c.numCadeiras;
                this.notify();
                // Mudar para aba calculadora
                document.querySelector('.tab-btn[data-tab="calculator"]').click();
                showToast(`Cenário "${c.nome}" carregado.`);
            }
        },
        notify() { // Dispara eventos para atualizar UI
            document.dispatchEvent(new CustomEvent('appStateChanged'));
        }
    };

    // ==================== LÓGICA ELEITORAL ====================
    function calcularResultado(partidosData, votosValidos, cadeiras) {
        if (!partidosData.length) return null;
        const QE = Math.floor(votosValidos / cadeiras);
        const limitePartido80 = Math.floor(0.8 * QE) + 1;
        const limiteCandidato20 = Math.floor(0.2 * QE) + 1;
        let vagasDiretas = {};
        for (let p of partidosData) vagasDiretas[p.nome] = Math.floor(p.total / QE);
        let totalDiretas = Object.values(vagasDiretas).reduce((a,b)=>a+b,0);
        let sobrasRestantes = cadeiras - totalDiretas;
        let partidosAptos = partidosData.filter(p => p.total >= limitePartido80 && p.candidatos.some(c => c.votos >= limiteCandidato20));
        let eleitos = [];
        let jaEleitos = new Set();
        const eleger = (partidoNome, candidatoNome, votos, tipo) => {
            let key = `${partidoNome}|${candidatoNome}`;
            if (!jaEleitos.has(key)) { jaEleitos.add(key); eleitos.push({ partido: partidoNome, candidato: candidatoNome, votos, tipo }); return true; }
            return false;
        };
        // Diretas
        for (let p of partidosData) {
            let vagas = vagasDiretas[p.nome] || 0;
            if(vagas===0) continue;
            let ordenados = [...p.candidatos].sort((a,b)=>b.votos - a.votos);
            for(let i=0; i<vagas && i<ordenados.length; i++) eleger(p.nome, ordenados[i].nome, ordenados[i].votos, 'Direta');
        }
        let vagasAtuais = {...vagasDiretas};
        while(sobrasRestantes > 0){
            let competidores = partidosAptos.filter(p => p.candidatos.some(c => c.votos >= limiteCandidato20 && !jaEleitos.has(`${p.nome}|${c.nome}`)));
            if(competidores.length===0) break;
            let melhorMedia=-1, melhorPartido=null;
            for(let p of competidores){
                let media = p.total / ((vagasAtuais[p.nome]||0) + 1);
                if(media > melhorMedia){ melhorMedia=media; melhorPartido=p; }
            }
            if(!melhorPartido) break;
            vagasAtuais[melhorPartido.nome] = (vagasAtuais[melhorPartido.nome]||0)+1;
            sobrasRestantes--;
            let elegiveis = melhorPartido.candidatos.filter(c => c.votos >= limiteCandidato20 && !jaEleitos.has(`${melhorPartido.nome}|${c.nome}`)).sort((a,b)=>b.votos - a.votos);
            if(elegiveis.length) eleger(melhorPartido.nome, elegiveis[0].nome, elegiveis[0].votos, 'Sobra');
        }
        let vagasPorPartido = {};
        for(let p of partidosData){
            let dir = vagasDiretas[p.nome]||0;
            let sob = eleitos.filter(e=>e.partido===p.nome && e.tipo==='Sobra').length;
            vagasPorPartido[p.nome] = { diretas:dir, sobras:sob, total:dir+sob };
        }
        return { QE, limitePartido80, limiteCandidato20, totalDiretas, sobrasDistribuidas: eleitos.filter(e=>e.tipo==='Sobra').length, sobrasNaoPreenchidas: sobrasRestantes, votosValidos, cadeiras, partidos: partidosData, vagasDiretas, eleitos, vagasPorPartido };
    }

    // ==================== RENDERIZAÇÃO DA TABELA (OTIMIZADA) ====================
    let tabelaTbody = null;
    function renderizarTabela() {
        if (!tabelaTbody) tabelaTbody = document.getElementById('partidosTbody');
        if (!tabelaTbody) return;
        tabelaTbody.innerHTML = '';
        App.partidos.forEach((p, idx) => {
            const tr = document.createElement('tr');
            tr.dataset.pidx = idx;
            // Nome
            const tdNome = document.createElement('td');
            const inpNome = document.createElement('input');
            inpNome.type = 'text'; inpNome.value = p.nome; inpNome.maxLength = 30;
            inpNome.addEventListener('change', (e) => { p.nome = validarNome(e.target.value); renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false); });
            tdNome.appendChild(inpNome);
            // Total
            const tdTotal = document.createElement('td');
            const divTotal = document.createElement('div'); divTotal.style.display = 'flex'; divTotal.style.alignItems = 'center'; divTotal.style.gap = '0.5rem';
            const inpTotal = document.createElement('input');
            inpTotal.type = 'number'; inpTotal.value = p.total; inpTotal.min = 0;
            inpTotal.addEventListener('change', (e) => { p.total = validarVotos(e.target.value); renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false); });
            divTotal.appendChild(inpTotal);
            const somaCand = p.candidatos.reduce((s,c)=>s+c.votos,0);
            if (somaCand > p.total) {
                const warn = document.createElement('i'); warn.className = 'fas fa-exclamation-triangle warning-icon'; warn.title = `Soma dos candidatos (${somaCand}) excede o total (${p.total}). O cálculo usa o total informado.`;
                divTotal.appendChild(warn);
            }
            tdTotal.appendChild(divTotal);
            // Candidatos
            const tdCand = document.createElement('td');
            const container = document.createElement('div');
            p.candidatos.forEach((cand, cidx) => {
                const row = document.createElement('div'); row.className = 'candidato-row';
                row.innerHTML = `
                    <input type="text" value="${escapeHtml(cand.nome)}" data-cand-nome data-pidx="${idx}" data-cidx="${cidx}" maxlength="30" style="width:120px;">
                    <input type="number" value="${cand.votos}" data-cand-voto data-pidx="${idx}" data-cidx="${cidx}" min="0" style="width:90px;">
                    <button class="btn-sm btn-outline" data-remove-cand data-pidx="${idx}" data-cidx="${cidx}"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(row);
            });
            const addDiv = document.createElement('div'); addDiv.className = 'add-cand-form';
            addDiv.innerHTML = `<input type="text" id="newCandNome_${idx}" placeholder="Nome" maxlength="30"><input type="number" id="newCandVotos_${idx}" placeholder="Votos" min="0" value="0"><button class="btn-sm btn-outline" data-add-cand data-idx="${idx}"><i class="fas fa-plus"></i> Adicionar</button>`;
            container.appendChild(addDiv);
            tdCand.appendChild(container);
            // Ações
            const tdAcoes = document.createElement('td');
            const btnDel = document.createElement('button'); btnDel.innerHTML = '<i class="fas fa-times-circle"></i>'; btnDel.className = 'btn-sm btn-outline'; btnDel.style.color = 'var(--danger)';
            btnDel.addEventListener('click', () => { App.partidos.splice(idx,1); renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false); });
            tdAcoes.appendChild(btnDel);
            tr.append(tdNome, tdTotal, tdCand, tdAcoes);
            tabelaTbody.appendChild(tr);
        });
        // Eventos delegados
        document.querySelectorAll('[data-cand-nome]').forEach(inp => inp.addEventListener('change', (e) => {
            let pidx = parseInt(e.target.dataset.pidx), cidx = parseInt(e.target.dataset.cidx);
            if (App.partidos[pidx]?.candidatos[cidx]) App.partidos[pidx].candidatos[cidx].nome = validarNome(e.target.value);
            renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false);
        }));
        document.querySelectorAll('[data-cand-voto]').forEach(inp => inp.addEventListener('change', (e) => {
            let pidx = parseInt(e.target.dataset.pidx), cidx = parseInt(e.target.dataset.cidx);
            let val = validarVotos(e.target.value);
            if (App.partidos[pidx]?.candidatos[cidx]) App.partidos[pidx].candidatos[cidx].votos = val;
            renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false);
        }));
        document.querySelectorAll('[data-remove-cand]').forEach(btn => btn.addEventListener('click', (e) => {
            let pidx = parseInt(btn.dataset.pidx), cidx = parseInt(btn.dataset.cidx);
            if (App.partidos[pidx]) App.partidos[pidx].candidatos.splice(cidx,1);
            renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false);
        }));
        document.querySelectorAll('[data-add-cand]').forEach(btn => btn.addEventListener('click', (e) => {
            let idx = parseInt(btn.dataset.idx);
            let nome = document.getElementById(`newCandNome_${idx}`).value.trim();
            let votos = validarVotos(document.getElementById(`newCandVotos_${idx}`).value);
            if (!nome) { showToast('Digite o nome do candidato', 'error'); return; }
            App.partidos[idx].candidatos.push({ nome: validarNome(nome), votos });
            renderizarTabela(); atualizarResultados(); App.salvarCenarioAtual(null, false);
        }));
    }

    // ==================== ATUALIZAÇÃO DOS RESULTADOS E GRÁFICO ====================
    function atualizarResultados() {
        const votosValidos = validarVotos(document.getElementById('totalVotos').value);
        const cadeiras = validarVotos(document.getElementById('numCadeiras').value);
        const dados = calcularResultado(App.partidos, votosValidos, cadeiras);
        const statsDiv = document.getElementById('resultadoStats');
        if (!dados || !App.partidos.length) {
            statsDiv.innerHTML = '<p>Nenhum partido cadastrado.</p>';
            if (App.chartInstance) { App.chartInstance.destroy(); App.chartInstance = null; }
            return;
        }
        // Estatísticas
        let html = `<div><strong>Quociente Eleitoral:</strong> ${dados.QE} votos</div>
                    <div><strong>80% QE (partido):</strong> ${dados.limitePartido80} | <strong>20% QE (candidato):</strong> ${dados.limiteCandidato20}</div>
                    <div><strong>Vagas diretas:</strong> ${dados.totalDiretas} | <strong>Sobras distribuídas:</strong> ${dados.sobrasDistribuidas}</div>`;
        if (dados.sobrasNaoPreenchidas > 0) html += `<div class="badge">⚠️ ${dados.sobrasNaoPreenchidas} sobras não preenchidas</div>`;
        html += `<hr><h4>Candidatos Eleitos</h4><ul>`;
        for (let e of dados.eleitos.sort((a,b)=>a.partido.localeCompare(b.partido))) {
            html += `<li><strong>${e.partido}</strong> - ${e.candidato} (${e.votos} votos, ${e.tipo})</li>`;
        }
        html += `</ul>`;
        statsDiv.innerHTML = html;
        // Gráfico
        const ctx = document.getElementById('vagasChart').getContext('2d');
        if (App.chartInstance) App.chartInstance.destroy();
        const partidosComVagas = dados.partidos.filter(p => p.total > 0);
        const labels = partidosComVagas.map(p => p.nome);
        const valores = partidosComVagas.map(p => dados.vagasPorPartido[p.nome]?.total || 0);
        const cores = partidosComVagas.map((_, i) => App.getCor(i));
        if (labels.length) {
            const plugins = [];
            if (typeof ChartDataLabels !== 'undefined') plugins.push(ChartDataLabels);
            App.chartInstance = new Chart(ctx, {
                type: 'pie',
                data: { labels, datasets: [{ data: valores, backgroundColor: cores }] },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: { callbacks: { label: (item) => `${item.label}: ${item.raw} cadeira(s)` } },
                        datalabels: plugins.length ? {
                            formatter: (value, context) => `${context.chart.data.labels[context.dataIndex]} ${value}`,
                            color: '#fff', backgroundColor: 'rgba(0,0,0,0.6)', borderRadius: 4, padding: 4, font: { weight: 'bold', size: 11 }
                        } : undefined
                    }
                },
                plugins
            });
        } else { ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height); }
    }

    // ==================== PDF (com salvamento independente) ====================
    async function gerarPDF() {
        const dados = calcularResultado(validarVotos(document.getElementById('totalVotos').value), validarVotos(document.getElementById('numCadeiras').value));
        if (!dados) { showToast('Nenhum dado para gerar PDF', 'error'); return false; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        doc.setFontSize(18);
        doc.text("SEU VOTO CERTO - Relatório Oficial", pageWidth/2, 20, { align: "center" });
        doc.setFontSize(10);
        doc.text(`Gerado em: ${new Date().toLocaleString()}`, pageWidth/2, 30, { align: "center" });
        doc.text(`Votos válidos: ${dados.votosValidos} | Cadeiras: ${dados.cadeiras} | QE: ${dados.QE}`, pageWidth/2, 38, { align: "center" });
        doc.autoTable({
            startY: 48,
            head: [['Partido','Total Votos','Diretas','Sobras','Total']],
            body: dados.partidos.map(p => {
                let v = dados.vagasPorPartido[p.nome] || { diretas:0, sobras:0, total:0 };
                return [p.nome, p.total, v.diretas, v.sobras, v.total];
            }),
            theme: 'striped', styles: { fontSize: 9 }, headStyles: { fillColor: [15,118,110] }
        });
        let y = doc.lastAutoTable.finalY + 10;
        doc.text("Candidatos Eleitos", 14, y);
        y += 6;
        doc.autoTable({
            startY: y,
            head: [['Partido','Candidato','Votos','Tipo']],
            body: dados.eleitos.map(e => [e.partido, e.candidato, e.votos, e.tipo]),
            theme: 'striped', styles: { fontSize: 9 }
        });
        doc.setFontSize(8);
        doc.text("Sistema SEU VOTO CERTO - Cálculo proporcional segundo legislação brasileira", pageWidth/2, 280, { align: "center" });
        doc.save("relatorio_seu_voto_certo.pdf");
        return true;
    }

    async function salvarCenarioComPdf() {
        const nome = prompt("Nome do cenário:", `Cenário ${App.cenarios.length+1}`);
        if (!nome) return;
        await gerarPDF(); // Gera o PDF e salva no computador
        App.salvarCenarioAtual(nome, true);
    }
